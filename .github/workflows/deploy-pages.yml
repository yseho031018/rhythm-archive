name: Verify and deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify generated Drift code
        run: |
          dart run build_runner build
          git diff --exit-code -- lib/prototype/database/harutalk_database.g.dart

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Flutter Web
        run: flutter build web --release --base-href "/rhythm-archive/"

      - name: Add presentation and WBS to the Pages artifact
        run: |
          mkdir -p build/web/docs/presentation/assets
          mkdir -p build/web/docs/presentation/demo-video
          mkdir -p build/web/assets/tori
          cp presentation.html wbs-gantt.html build/web/
          cp docs/presentation/assets/*.png build/web/docs/presentation/assets/
          cp docs/presentation/demo-video/*.mp4 build/web/docs/presentation/demo-video/
          cp assets/tori/*.png build/web/assets/tori/
          touch build/web/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
