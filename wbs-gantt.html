<html lang="ko">
<head>
<meta charset="UTF-8">

<title>Rhythm — WBS &amp; Gantt Chart</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Malgun Gothic", "맑은 고딕", "Segoe UI", sans-serif;
    font-size: 12px;
    color: #111;
    background: #fff;
    padding: 16px;
  }
  h2 {
    font-size: 16px;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  /* ===== Table ===== */
  .wbs-table {
    border-collapse: collapse;
    width: 100%;
    table-layout: fixed;
  }
  .wbs-table th, .wbs-table td {
    border: 1px solid #b4b4b4;
    padding: 3px 5px;
    vertical-align: middle;
    height: 22px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .wbs-table th {
    background: #f2f2f2;
    font-weight: 700;
    text-align: center;
  }

  /* Column widths */
  .col-wbs     { width: 50px; text-align: center; }
  .col-task    { width: 160px; }
  .col-owner   { width: 70px; text-align: center; }
  .col-status  { width: 85px; text-align: center; }
  .col-start   { width: 80px; text-align: center; }
  .col-finish  { width: 80px; text-align: center; }
  .col-w       { width: 35px; text-align: center; }
  .col-pct     { width: 40px; text-align: center; }
  .col-gantt   { width: 340px; position: relative; }

  /* Level styling */
  .lv1 td {
    background: #d9d9d9 !important;
    font-weight: 700;
  }
  .lv1 .col-task { padding-left: 5px; }
  .lv2 .col-task { padding-left: 18px; }
  .lv3 .col-task { padding-left: 32px; font-size: 11px; }

  /* Status colors */
  .st-completed { color: #0000ff; }
  .st-progress  { color: #0000ff; }
  .st-notstart  { color: #808080; }
  .st-milestone { background: #e6f3ff !important; color: #0000ff; font-weight: 600; }

  /* Gantt header scale */
  .gantt-scale {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #555;
    padding: 0 2px;
    margin-bottom: 2px;
    border-bottom: 1px solid #ddd;
  }

  /* Gantt bar cell */
  .gantt-cell {
    position: relative;
    padding: 0 !important;
  }
  .gantt-track {
    position: relative;
    height: 18px;
    width: 100%;
  }
  .gantt-bar {
    position: absolute;
    top: 4px;
    height: 10px;
    border-radius: 1px;
    min-width: 2px;
  }
  .bar-completed { background: #4472c4; }
  .bar-progress  { background: #4472c4; }
  .bar-notstart  { background: #d9d9d9; border: 1px solid #b4b4b4; }
  .bar-milestone {
    width: 10px !important; height: 10px;
    background: #4472c4;
    transform: rotate(45deg);
    top: 4px;
  }

  /* Today line (optional) */
  .today-line {
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: red;
    z-index: 2;
  }

  /* Hover */
  tr:not(.lv1):hover td {
    background: #f5f5f5;
  }
</style>

    { wbs:'4.5',   task:'설정 화면',                    lv:2, owner:'윤세호', status:'Not Started', start:'06-13', finish:'06-15', w:'3', pct:'0',   bar:'grey' },

    { wbs:'5',     task:'Particle 시각화 시스템',        lv:1, owner:'-',      status:'-',          start:'',       finish:'',       w:'', pct:'',  bar:'none' },
    { wbs:'5.1',   task:'Particle 엔진',                lv:2, owner:'윤세호', status:'Not Started', start:'05-26', finish:'06-05', w:'11', pct:'0',  bar:'grey' },
    { wbs:'5.1.1', task:'CustomPainter / 프레임 루프',    lv:3, owner:'윤세호', status:'Not Started', start:'05-26', finish:'06-01', w:'7', pct:'0',   bar:'grey' },

    { wbs:'8',     task:'배포 및 릴리즈',               lv:1, owner:'-',      status:'-',          start:'',       finish:'',       w:'', pct:'',  bar:'none' },

  function fmtDate(md) {
    if (!md) return '';
    const y = '2026';
    return y + '-' + md;
  }

  function parseDate(md) {
    if (!md) return null;
    return new Date('2026-' + md);
  }

  function ganttHTML(row) {
    const s = parseDate(row.start);
    const f = parseDate(row.finish);
    if (!s || !f || row.bar === 'none') return '<div class="gantt-track"></div>';

    if (row.bar === 'milestone') {
      const left = ((s - PROJ_START) / (1000*60*60*24) / PROJ_DAYS) * 100;
      return `<div class="gantt-track"><div class="gantt-bar bar-milestone" style="left:${left}%"></div></div>`;
    }

    const startDay = (s - PROJ_START) / (1000*60*60*24);
    const duration = (f - s) / (1000*60*60*24) + 1;
    const leftPct  = (startDay / PROJ_DAYS) * 100;
    const widthPct = (duration / PROJ_DAYS) * 100;

    let cls = 'bar-notstart';
    if (row.status === 'Completed') cls = 'bar-completed';
    else if (row.status === 'In progress') cls = 'bar-progress';

    if (row.bar === 'grey') cls = 'bar-notstart';
    if (row.bar === 'full') cls = 'bar-completed';
    if (row.bar === 'partial') cls = 'bar-progress';

    return `<div class="gantt-track"><div class="gantt-bar ${cls}" style="left:${leftPct}%;width:${widthPct}%"></div></div>`;
  }

  function statusClass(st) {
    if (st === 'Completed') return 'st-completed';
    if (st === 'In progress') return 'st-progress';
    if (st === 'Not Started') return 'st-notstart';
    if (st === 'Milestone') return 'st-milestone';
    return '';
  }

  const tbody = document.getElementById('wbsBody');
  rows.forEach(r => {
    const tr = document.createElement('tr');
    tr.className = 'lv' + r.lv;
    if (r.status === 'Milestone') tr.classList.add('st-milestone');

    tr.innerHTML = `
      <td class="col-wbs">${r.wbs}</td>
      <td class="col-task">${r.task}</td>
      <td class="col-owner">${r.owner}</td>
      <td class="col-status ${statusClass(r.status)}">${r.status}</td>
      <td class="col-start">${fmtDate(r.start)}</td>
      <td class="col-finish">${fmtDate(r.finish)}</td>
      <td class="col-w">${r.w}</td>
      <td class="col-pct">${r.pct}</td>
      <td class="col-gantt gantt-cell">${ganttHTML(r)}</td>
    `;
    tbody.appendChild(tr);
  });
</script>
</body>
</html>
