<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhythm — WBS & Gantt Chart</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Malgun Gothic", "맑은 고딕", "Segoe UI", sans-serif;
    font-size: 12px;
    color: #111;
    background: #fff;
    padding: 16px;
  }
  h2 { font-size: 16px; margin-bottom: 8px; }
  .note {
    margin-bottom: 10px;
    padding: 8px 10px;
    border: 1px solid #d8d8d8;
    background: #fafafa;
    line-height: 1.45;
  }
  .wbs-table {
    border-collapse: collapse;
    width: 100%;
    table-layout: fixed;
  }
  .wbs-table th, .wbs-table td {
    border: 1px solid #b4b4b4;
    padding: 4px 6px;
    vertical-align: middle;
    height: 24px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .wbs-table th {
    background: #f2f2f2;
    font-weight: 700;
    text-align: center;
  }
  .col-wbs { width: 54px; text-align: center; }
  .col-task { width: 220px; }
  .col-owner { width: 72px; text-align: center; }
  .col-status { width: 92px; text-align: center; }
  .col-start, .col-finish { width: 82px; text-align: center; }
  .col-pct { width: 46px; text-align: center; }
  .col-gantt { width: 390px; }
  .lv1 td { background: #d9d9d9 !important; font-weight: 700; }
  .lv2 .col-task { padding-left: 18px; }
  .lv3 .col-task { padding-left: 34px; font-size: 11px; color: #333; }
  .st-completed { color: #0645ad; }
  .st-progress { color: #0645ad; }
  .st-notstart { color: #777; }
  .st-milestone { background: #e6f3ff !important; color: #0645ad; font-weight: 600; }
  .gantt-scale {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #555;
    border-bottom: 1px solid #ddd;
    padding-bottom: 2px;
  }
  .gantt-cell { position: relative; padding: 0 !important; }
  .gantt-track { position: relative; height: 19px; width: 100%; }
  .gantt-bar {
    position: absolute;
    top: 4px;
    height: 11px;
    border-radius: 1px;
    min-width: 3px;
  }
  .bar-completed { background: #4472c4; }
  .bar-progress { background: #70ad47; }
  .bar-notstart { background: #d9d9d9; border: 1px solid #b4b4b4; }
  .bar-milestone {
    width: 10px !important;
    height: 10px;
    background: #4472c4;
    transform: rotate(45deg);
    top: 4px;
  }
  tr:not(.lv1):hover td { background: #f7f7f7; }
</style>
</head>
<body>
<h2>Rhythm WBS &amp; Gantt Chart</h2>
<div class="note">
  실제 진행 흐름 반영: 중간 발표 대응을 위해 도메인/Isar 구현보다 Flutter Web 데모와 발표 URL 배포를 먼저 완료했다.
  이후 Riverpod, Isar, 레이어 분리 작업을 진행한다.
</div>

<table class="wbs-table">
  <thead>
    <tr>
      <th class="col-wbs">WBS</th>
      <th class="col-task">Task</th>
      <th class="col-owner">Owner</th>
      <th class="col-status">Status</th>
      <th class="col-start">Start</th>
      <th class="col-finish">Finish</th>
      <th class="col-pct">%</th>
      <th class="col-gantt">
        <div class="gantt-scale">
          <span>10주</span><span>11주</span><span>12주</span><span>13주</span><span>14주</span><span>15주</span>
        </div>
        Gantt
      </th>
    </tr>
  </thead>
  <tbody id="wbsBody"></tbody>
</table>

<script>
  const PROJ_START = new Date('2026-05-12');
  const PROJ_END = new Date('2026-06-22');
  const PROJ_DAYS = (PROJ_END - PROJ_START) / (1000 * 60 * 60 * 24);

  const rows = [
    { wbs:'1', task:'기획 및 요구사항', lv:1, owner:'-', status:'-', start:'', finish:'', pct:'', bar:'none' },
    { wbs:'1.1', task:'비전 / 요구사항 / MoSCoW', lv:2, owner:'윤세호', status:'Completed', start:'05-12', finish:'05-18', pct:'100', bar:'full' },
    { wbs:'1.2', task:'WBS / 위험 / 일정 문서', lv:2, owner:'윤세호', status:'Completed', start:'05-12', finish:'05-18', pct:'100', bar:'full' },
    { wbs:'1.3', task:'AUTHORING / BONUS', lv:2, owner:'윤세호', status:'Completed', start:'05-13', finish:'05-18', pct:'100', bar:'full' },

    { wbs:'2', task:'설계 결정 및 발표 준비', lv:1, owner:'-', status:'-', start:'', finish:'', pct:'', bar:'none' },
    { wbs:'2.1', task:'ADR 3개 작성', lv:2, owner:'윤세호', status:'Completed', start:'05-19', finish:'05-26', pct:'100', bar:'full' },
    { wbs:'2.2', task:'중간 발표자료 작성 및 HTML 변환', lv:2, owner:'윤세호', status:'Completed', start:'05-26', finish:'05-26', pct:'100', bar:'full' },
    { wbs:'2.3', task:'WBS/Gantt GitHub Pages 공개', lv:2, owner:'윤세호', status:'Completed', start:'05-25', finish:'05-26', pct:'100', bar:'full' },

    { wbs:'3', task:'Flutter Web 데모 선행 개발', lv:1, owner:'-', status:'-', start:'', finish:'', pct:'', bar:'none' },
    { wbs:'3.1', task:'Flutter 프로젝트 초기화', lv:2, owner:'윤세호', status:'Completed', start:'05-26', finish:'05-26', pct:'100', bar:'full' },
    { wbs:'3.2', task:'오늘 입력 / 히스토리 / 패턴 탭', lv:2, owner:'윤세호', status:'Completed', start:'05-26', finish:'05-26', pct:'100', bar:'full' },
    { wbs:'3.3', task:'Wave Graph 데모', lv:2, owner:'윤세호', status:'Completed', start:'05-26', finish:'05-26', pct:'100', bar:'full' },
    { wbs:'3.4', task:'GitHub Pages 앱 데모 배포', lv:2, owner:'윤세호', status:'Completed', start:'05-26', finish:'05-26', pct:'100', bar:'full' },
    { wbs:'3.5', task:'중간 발표', lv:2, owner:'윤세호', status:'Milestone', start:'05-26', finish:'05-26', pct:'100', bar:'milestone' },

    { wbs:'4', task:'아키텍처 정리 및 리팩토링', lv:1, owner:'-', status:'-', start:'', finish:'', pct:'', bar:'none' },
    { wbs:'4.1', task:'Presentation/Application/Domain/Data 분리', lv:2, owner:'윤세호', status:'In progress', start:'05-27', finish:'06-03', pct:'20', bar:'partial' },
    { wbs:'4.2', task:'Riverpod 상태 관리 도입', lv:2, owner:'윤세호', status:'Not Started', start:'05-29', finish:'06-04', pct:'0', bar:'grey' },

    { wbs:'5', task:'도메인 및 데이터 레이어', lv:1, owner:'-', status:'-', start:'', finish:'', pct:'', bar:'none' },
    { wbs:'5.1', task:'RhythmEntry / Repository / UseCase', lv:2, owner:'윤세호', status:'Not Started', start:'06-03', finish:'06-06', pct:'0', bar:'grey' },
    { wbs:'5.2', task:'Isar DB 연동 및 임시 저장 교체', lv:2, owner:'윤세호', status:'Not Started', start:'06-05', finish:'06-10', pct:'0', bar:'grey' },

    { wbs:'6', task:'기능 고도화', lv:1, owner:'-', status:'-', start:'', finish:'', pct:'', bar:'none' },
    { wbs:'6.1', task:'히스토리 조회/수정/삭제 개선', lv:2, owner:'윤세호', status:'Not Started', start:'06-09', finish:'06-13', pct:'0', bar:'grey' },
    { wbs:'6.2', task:'패턴 힌트 및 통계 개선', lv:2, owner:'윤세호', status:'Not Started', start:'06-10', finish:'06-15', pct:'0', bar:'grey' },
    { wbs:'6.3', task:'설정/내보내기/리마인드 선택 구현', lv:2, owner:'윤세호', status:'Not Started', start:'06-12', finish:'06-16', pct:'0', bar:'grey' },

    { wbs:'7', task:'테스트 및 최종 발표 준비', lv:1, owner:'-', status:'-', start:'', finish:'', pct:'', bar:'none' },
    { wbs:'7.1', task:'위젯 테스트 / Web 빌드 검증', lv:2, owner:'윤세호', status:'In progress', start:'05-26', finish:'06-18', pct:'30', bar:'partial' },
    { wbs:'7.2', task:'README / setup / architecture 최신화', lv:2, owner:'윤세호', status:'In progress', start:'05-26', finish:'06-18', pct:'40', bar:'partial' },
    { wbs:'7.3', task:'최종 발표자료 및 Q&A 로그', lv:2, owner:'윤세호', status:'Not Started', start:'06-18', finish:'06-22', pct:'0', bar:'grey' },
    { wbs:'7.4', task:'최종 발표', lv:2, owner:'윤세호', status:'Milestone', start:'06-22', finish:'06-22', pct:'0', bar:'milestone' },
  ];

  function fmtDate(md) {
    return md ? `2026-${md}` : '';
  }

  function parseDate(md) {
    return md ? new Date(`2026-${md}`) : null;
  }

  function ganttHTML(row) {
    const s = parseDate(row.start);
    const f = parseDate(row.finish);
    if (!s || !f || row.bar === 'none') return '<div class="gantt-track"></div>';

    const startDay = (s - PROJ_START) / (1000 * 60 * 60 * 24);
    const leftPct = (startDay / PROJ_DAYS) * 100;

    if (row.bar === 'milestone') {
      return `<div class="gantt-track"><div class="gantt-bar bar-milestone" style="left:${leftPct}%"></div></div>`;
    }

    const duration = (f - s) / (1000 * 60 * 60 * 24) + 1;
    const widthPct = (duration / PROJ_DAYS) * 100;
    let cls = 'bar-notstart';
    if (row.bar === 'full') cls = 'bar-completed';
    if (row.bar === 'partial') cls = 'bar-progress';
    if (row.bar === 'grey') cls = 'bar-notstart';
    return `<div class="gantt-track"><div class="gantt-bar ${cls}" style="left:${leftPct}%;width:${widthPct}%"></div></div>`;
  }

  function statusClass(status) {
    if (status === 'Completed') return 'st-completed';
    if (status === 'In progress') return 'st-progress';
    if (status === 'Not Started') return 'st-notstart';
    if (status === 'Milestone') return 'st-milestone';
    return '';
  }

  const tbody = document.getElementById('wbsBody');
  rows.forEach((row) => {
    const tr = document.createElement('tr');
    tr.className = `lv${row.lv}`;
    if (row.status === 'Milestone') tr.classList.add('st-milestone');
    tr.innerHTML = `
      <td class="col-wbs">${row.wbs}</td>
      <td class="col-task">${row.task}</td>
      <td class="col-owner">${row.owner}</td>
      <td class="col-status ${statusClass(row.status)}">${row.status}</td>
      <td class="col-start">${fmtDate(row.start)}</td>
      <td class="col-finish">${fmtDate(row.finish)}</td>
      <td class="col-pct">${row.pct}</td>
      <td class="col-gantt gantt-cell">${ganttHTML(row)}</td>
    `;
    tbody.appendChild(tr);
  });
</script>
</body>
</html>
